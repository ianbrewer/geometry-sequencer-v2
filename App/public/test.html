<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Sequencer Test</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #000; }
        #canvas-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <script src="./pixi.min.js"></script>
    <script src="./player.js"></script>
    <script>
        const projectData = {
            "id": "test",
            "name": "Test project",
            "duration": 10,
            "backgroundColor": "#000000",
            "layers": [
                {
                    "id": "L268a735c",
                    "name": "Amino Acids",
                    "type": "amino",
                    "visible": true,
                    "timeline": { "start": 0, "end": 10 },
                    "fadeIn": { "enabled": false, "duration": 1 },
                    "fadeOut": { "enabled": false, "duration": 1 },
                    "config": {
                        "sides": 3,
                        "instances": 1,
                        "fillEnabled": true,
                        "strokeEnabled": false,
                        "strokeColor": "#ffffff",
                        "fillColor": "#ff0000",
                        "alignToPath": true
                    },
                    "keyframes": [
                        {
                            "id": "k1",
                            "time": 0,
                            "easing": "easeInOutSine",
                            "value": {
                                "radiusX": 25,
                                "radiusY": 25,
                                "posX": 0,
                                "posY": 0,
                                "orbitRadius": 0,
                                "rotateOrbit": 0,
                                "rotateShape": 0,
                                "opacity": 255
                            }
                        }
                    ],
                    "symmetry": { "enabled": false }
                }
            ]
        };

        window.onload = () => {
            console.log("PIXI:", window.PIXI);
            if(window.GeometryApp) {
                window.GeometryApp.init('canvas-container', projectData);
            }
        };
    </script>
</body>
</html>
