<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Geometry Sequencer Test Amino MJS</title>
    <style>
        body, html { margin: 0; padding: 0; width: 800px; height: 800px; background: #000; }
        #canvas-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <script type="module">
        // Import patched PIXI from mjs
        import * as PIXI from '../node_modules/pixi.js/dist/pixi.mjs';
        window.PIXI = PIXI;
        
        // Dynamically load player.js AFTER PIXI is global
        const script = document.createElement('script');
        script.src = './player.js';
        script.onload = () => {
            const projectData = {
                "id": "test4",
                "name": "Test amino",
                "duration": 10,
                "backgroundColor": "#000000",
                "layers": [
                    {
                        "id": "Lamino",
                        "name": "Amino",
                        "type": "amino",
                        "visible": true,
                        "timeline": { "start": 0, "end": 10 },
                        "fadeIn": { "enabled": false, "duration": 1 },
                        "fadeOut": { "enabled": false, "duration": 1 },
                        "config": {
                            "sides": 3,
                            "instances": 1,
                            "fillEnabled": true,
                            "strokeEnabled": false,
                            "fillColor": "#00ff00",
                            "alignToPath": true
                        },
                        "keyframes": [
                            {
                                "id": "k1",
                                "time": 0,
                                "easing": "easeInOutSine",
                                "value": {
                                    "radiusX": 100,
                                    "radiusY": 100,
                                    "posX": 0,
                                    "posY": 0,
                                    "orbitRadius": 0,
                                    "rotateOrbit": 0,
                                    "rotateShape": 0,
                                    "strokeWeight": 1,
                                    "opacity": 255
                                }
                            }
                        ],
                        "symmetry": { "enabled": false }
                    }
                ]
            };
            if(window.GeometryApp) {
                window.GeometryApp.init('canvas-container', projectData);
            }
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
